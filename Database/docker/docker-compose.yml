services:
  mysql:
    image: mysql:8.0
    container_name: pe-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-poc123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - pe-mysql-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-poc123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pe-mysql-data:
